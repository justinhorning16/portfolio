    <body>
        <header class="text-center">
            <a href="index.html"><img src="images/logo.png" alt="Logo" style="width: 5%; height: 5%;" class="d-inline-block"></a>
            <a href="index.html" style="text-decoration: none;"><h1 class="display-1 barlow-condensed-bold">Elevate Coaching</h1></a>
        </header>
        <nav class="navbar navbar-expand-lg" data-bs-theme="light">
            <div class="container-fluid d-flex justify-content-center align-items-center">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navDropdown" aria-controls="navDropdown" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse text-center justify-content-center" id="navDropdown">
                    <ul class="navbar-nav nav-underline barlow-condensed-bold">
                        <li class="nav-item">

                        <li class="nav-item">

                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="contact.html">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container-fluid">
            <div class="row" id="contactbanner">
                <div class="col-6 offset-3 text-center">
                    <h2 class="d-inline-block display-2 barlow-condensed-bold px-3" id="contactheading">Contact Us</h2>
                </div>
            </div>
        <form> 
        <div class="row g-3 justify-content-center">
            <div class="col-12 col-md-5">
                <label class="form-label barlow-condensed-bold fs-5">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter email...">
            </div>

            <div class="col-12 col-md-5 offset-md-1">
                <label class="form-label barlow-condensed-bold fs-5">Name</label>
                <input type="text" class="form-control" placeholder="Enter name...">
            </div>

            <div class="col-12 col-md-5">
                <label class="form-label barlow-condensed-bold fs-5">Discord</label>
                <input type="text" class="form-control" placeholder="Enter discord...">
            </div>

            <div class="col-12 col-md-5 offset-md-1">
                <label class="form-label barlow-condensed-bold fs-5">Message</label>
                <textarea class="form-control" style="height:100px" placeholder="Enter message here..."></textarea>
            </div>

            <div class="col-2 mx-auto mt-3 mb-3 d-grid">
                <button type="submit" name="submit" class="btn btn-secondary barlow-condensed-regular fs-5">Submit</button>
            </div>
        </div>
        </form>   
        <div class="row text-center">
